name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run the deterministic browser smoke test
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  security:
    name: Secret scan and production audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false
      - name: Install Node.js with the pnpm store cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Test the secret scanner
        run: node --test scripts/ci/scan-secrets.test.mjs
      - name: Scan tracked files and Git history
        run: node scripts/scan-secrets.mjs --history
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=critical

  quality:
    name: ${{ matrix.gate.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        gate:
          - name: Format
            command: pnpm format:check
          - name: Lint and boundaries
            command: pnpm lint
          - name: Typecheck
            command: pnpm typecheck
          - name: Unit tests
            command: pnpm test
          - name: Production build
            command: pnpm build
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false
      - name: Install Node.js with the pnpm store cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.gate.name }}
        run: ${{ matrix.gate.command }}

  contracts:
    name: Contract tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false
      - name: Install Node.js with the pnpm store cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run contract tests
        run: pnpm test:contracts

  e2e:
    name: Deterministic end-to-end test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false
      - name: Install Node.js with the pnpm store cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Install the pinned Playwright browser
        run: pnpm --filter @donebond/e2e exec playwright install --with-deps chromium
      - name: Run the browser smoke test
        run: pnpm test:e2e
