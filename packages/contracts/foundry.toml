[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
bytecode_hash = "ipfs"
cbor_metadata = true
ffi = false
fuzz = { runs = 512 }
invariant = { runs = 256, depth = 64, fail_on_revert = false }

[profile.coverage]
optimizer = false
optimizer_runs = 0
via_ir = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
monad_testnet = "${MONAD_TESTNET_RPC_URL}"

[etherscan]
monad_testnet = { key = "${MONAD_EXPLORER_API_KEY}", url = "${MONAD_EXPLORER_API_URL}" }
